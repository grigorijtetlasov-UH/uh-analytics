name: Daily UH Analytics

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 за Києвом (UTC+2)
  workflow_dispatch:      # можна запустити вручну

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore GA4 service account key
        run: echo '${{ secrets.GA4_CREDENTIALS_JSON }}' > ga4-service-account.json

      - name: Fetch data
        env:
          API_URL:         ${{ secrets.API_URL }}
          API_URL_SH:      ${{ secrets.API_URL_SH }}
          API_SH_USER:     ${{ secrets.API_SH_USER }}
          API_SH_PASS:     ${{ secrets.API_SH_PASS }}
          SD_API_KEY:      ${{ secrets.SD_API_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_CREDENTIALS: ga4-service-account.json
          META_TOKEN_BM1:  ${{ secrets.META_TOKEN_BM1 }}
          META_TOKEN_BM2:  ${{ secrets.META_TOKEN_BM2 }}
          GADS_DEVELOPER_TOKEN:    ${{ secrets.GADS_DEVELOPER_TOKEN }}
          GADS_CLIENT_ID:          ${{ secrets.GADS_CLIENT_ID }}
          GADS_CLIENT_SECRET:      ${{ secrets.GADS_CLIENT_SECRET }}
          GADS_REFRESH_TOKEN:      ${{ secrets.GADS_REFRESH_TOKEN }}
          GADS_LOGIN_CUSTOMER_ID:  ${{ secrets.GADS_LOGIN_CUSTOMER_ID }}
          GADS_AMEBLI_ID:          ${{ secrets.GADS_AMEBLI_ID }}
          GADS_MATRASROLL_ID:      ${{ secrets.GADS_MATRASROLL_ID }}
        run: python fetch_data.py

      - name: Cleanup secrets
        if: always()
        run: rm -f ga4-service-account.json

      - name: Check if today's CRM data is present
        id: crm_check
        run: |
          # Перевіряємо JSON за СЬОГОДНІ (вчорашній CI пишеться сьогодні).
          # Якщо його немає або CRM пустий — пропускаємо commit, щоб не плутати з локальними.
          TODAY=$(date +%Y-%m-%d)
          TODAY_JSON="history/${TODAY}.json"
          if [ ! -f "$TODAY_JSON" ]; then
            echo "has_crm=false" >> $GITHUB_OUTPUT
            echo "Немає $TODAY_JSON — fetch_data.py не створив (можливо ще немає CRM Excel)"
            exit 0
          fi
          echo "Перевіряю: $TODAY_JSON"
          HAS_CRM=$(python -c "
          import json
          try:
              d = json.load(open('$TODAY_JSON', encoding='utf-8'))
              orders = d.get('crm', {}).get('orders', {})
              if orders and orders.get('total', 0) > 0:
                  print('true')
              else:
                  print('false')
          except Exception:
              print('false')
          ")
          echo "has_crm=$HAS_CRM" >> $GITHUB_OUTPUT
          if [ "$HAS_CRM" = "true" ]; then
            echo "CRM дані за сьогодні наявні — генеруємо дашборд і комітимо"
          else
            echo "CRM дані за сьогодні відсутні — пропускаємо commit"
            echo "Очікуємо локального запуску fetch_data.py зі свіжою CRM-вивантажкою"
          fi

      - name: Generate dashboard
        if: steps.crm_check.outputs.has_crm == 'true'
        run: python generate_dashboard.py

      - name: Commit and push
        if: steps.crm_check.outputs.has_crm == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ docs/
          git diff --staged --quiet || git commit -m "Daily report $(date +%Y-%m-%d)"
          git push
