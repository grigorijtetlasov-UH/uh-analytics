<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>United Home Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f1a;--s:#151929;--s2:#1c2137;--brd:#2a3050;--brd2:#3a4170;
  --t:#e4e8f7;--t2:#c1c7e0;--td:#7b84a3;--td2:#5a6280;
  --ac:#6c5ce7;--ac2:#a29bfe;--g:#00d68f;--r:#ff6b6b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;font-size:14px;
}
.bg-glow{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.bg-glow::before{
  content:'';position:absolute;width:600px;height:600px;
  background:radial-gradient(circle,rgba(108,92,231,.18),transparent 70%);
  top:-200px;left:50%;transform:translateX(-50%);
}
.card{
  position:relative;z-index:1;
  background:var(--s);border:1px solid var(--brd);border-radius:18px;
  padding:40px 36px;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.logo{
  font-size:26px;font-weight:700;text-align:center;
  background:linear-gradient(135deg,var(--ac2),var(--g));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:-0.5px;margin-bottom:6px;
}
.sub{
  text-align:center;color:var(--td);font-size:10px;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:30px;
}
.lock-icon{
  width:48px;height:48px;margin:0 auto 22px;
  display:flex;align-items:center;justify-content:center;
  background:var(--s2);border:1px solid var(--brd);border-radius:12px;
  font-size:22px;
}
label{
  display:block;font-size:11px;color:var(--td);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
}
.input-wrap{position:relative;margin-bottom:18px}
input[type=password],input[type=text]{
  width:100%;background:var(--bg);border:1px solid var(--brd);
  border-radius:10px;padding:13px 44px 13px 14px;
  color:var(--t);font-size:15px;font-family:'DM Sans',sans-serif;
  transition:.15s;outline:none;
}
input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(108,92,231,.15)}
.toggle-eye{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--td);cursor:pointer;
  font-size:16px;padding:4px;line-height:1;
}
button.submit{
  width:100%;background:var(--ac);color:#fff;border:none;
  border-radius:10px;padding:14px;font-size:15px;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:.15s;
}
button.submit:hover{background:#7d6ef0}
button.submit:active{transform:scale(.98)}
.error{
  color:var(--r);font-size:13px;text-align:center;
  margin-top:16px;min-height:18px;opacity:0;transition:.2s;
}
.error.show{opacity:1}
.footer{
  text-align:center;color:var(--td2);font-size:10px;
  margin-top:24px;font-family:'JetBrains Mono',monospace;
}
.shake{animation:shake .4s}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  75%{transform:translateX(8px)}
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card" id="card">
  <div class="lock-icon">🔒</div>
  <div class="logo">United Home</div>
  <div class="sub">Analytics · приватний доступ</div>

  <label for="pw">Пароль</label>
  <div class="input-wrap">
    <input type="password" id="pw" autocomplete="current-password" autofocus
           placeholder="Введіть пароль">
    <button class="toggle-eye" id="eye" type="button" title="Показати/сховати">👁</button>
  </div>
  <button class="submit" id="go">Увійти</button>
  <div class="error" id="err"></div>

  <div class="footer">United Home © 2026</div>
</div>

<script>
// ── Налаштування ──
// SHA-256 хеш пароля. Сам пароль у коді НЕ зберігається.
const PASS_HASH = "c8a7be9deb703980ce2a0d06a5c21b3ef676437e150909ce725d46d8abb34dc1";
const REDIRECT_TO = "day.html";          // куди вести після входу
const SESSION_KEY = "uh_auth_ok";        // ключ у sessionStorage

// ── SHA-256 через Web Crypto API ──
async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, "0")).join("");
}

// ── Якщо вже авторизований у цій сесії — одразу пускаємо ──
if (sessionStorage.getItem(SESSION_KEY) === "1") {
  location.replace(REDIRECT_TO);
}

const pw = document.getElementById("pw");
const go = document.getElementById("go");
const err = document.getElementById("err");
const card = document.getElementById("card");
const eye = document.getElementById("eye");

async function tryLogin() {
  const val = pw.value;
  if (!val) return;
  const h = await sha256(val);
  if (h === PASS_HASH) {
    sessionStorage.setItem(SESSION_KEY, "1");
    location.replace(REDIRECT_TO);
  } else {
    err.textContent = "Невірний пароль";
    err.classList.add("show");
    card.classList.add("shake");
    pw.value = "";
    pw.focus();
    setTimeout(() => card.classList.remove("shake"), 400);
  }
}

go.addEventListener("click", tryLogin);
pw.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

// Показати/сховати пароль
eye.addEventListener("click", () => {
  pw.type = pw.type === "password" ? "text" : "password";
  pw.focus();
});
</script>
</body>
</html>
